addr: "0.0.0.0:9000"

# Database driver: "postgres" (default) or "mysql"
driver: postgres
dsn: "host=localhost port=5432 user=postgres password=postgres dbname=app sslmode=disable"

# Environment variables are supported:
# dsn: "${DATABASE_URL:-host=localhost port=5432 user=postgres password=postgres dbname=app sslmode=disable}"

# MySQL example:
# driver: mysql
# dsn: "root:password@tcp(localhost:3306)/app?charset=utf8mb4&parseTime=True&loc=Local"
